name: CI Pipeline
on: [push, pull_request]

jobs:
  nvml-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        working-directory: examples/nvml
        run: |
          ./download-nvidia-smi.sh
          ./build.sh
      - name: Test
        working-directory: examples/nvml
        env:
          LD_LIBRARY_PATH: .
        run: |
          finish() {
            cat run.log
          }
          trap finish EXIT ERR SIGINT SIGTERM

          echo "================" >> run.log
          echo "> nvidia-smi" >> run.log
          ./run.sh ./nvidia-smi 2>> run.log

          echo "================" >> run.log
          echo "> ./nvidia-smi -q" >> run.log
          ./run.sh ./nvidia-smi -q 2>> run.log

          echo "================" >> run.log
          echo "> ./nvidia-smi nvlink -s" >> run.log
          ./run.sh ./nvidia-smi nvlink -s 2>> run.log

          echo "================" >> run.log
          echo "> tests/discover-config.sh" >> run.log
          docker run --rm -v "$PWD/tests:/tests" libnvidia-ml-so:latest /tests/discover-config.sh 2>&1 | tee -a run.log
